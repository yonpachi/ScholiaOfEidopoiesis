site_name: 想成のスコーリア
site_url: https://yonpachi.github.io/ScholiaOfEidopoiesis/

validation:
  links:
    not_found: ignore

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - ホーム: index.md
