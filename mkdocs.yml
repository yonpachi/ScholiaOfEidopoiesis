site_name: 想成のスコーリア
site_url: https://yonpachi.github.io/ScholiaOfEidopoiesis/

validation:
  links:
    not_found: ignore

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: indigo # ヘッダー色
      accent: amber # リンク・ボタンのアクセント
      toggle:
        icon: material/brightness-7
        name: ダークモード
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: ライトモード
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  font:
    text: Noto Sans JP
    code: Inconsolata
  logo: assets/logo.png
  favicon: assets/icon.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - ホーム: index.md

extra:
  generator: false
