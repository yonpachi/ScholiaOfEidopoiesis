site_name: 想成のスコーリア

site_url: https://yonpachi.github.io/ScholiaOfEidopoiesis/

validation:
  links:
    not_found: ignore

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: indigo # ヘッダー色
      accent: amber # リンク・ボタンのアクセント
      toggle:
        icon: material/brightness-7
        name: ダークモード
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: ライトモード
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

  font:
    text: Noto Sans JP
    code: Inconsolata
  logo: assets/logo.png
  favicon: assets/icon.png

markdown_extensions:
  - mdx_truly_sane_lists:
      nested_indent: 2
      truly_sane: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      pygments_style: monokai
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true
  - def_list
  - attr_list

nav:
  - ホーム: index.md
  - はじめに: about.md
  - ルール:
      - キャラクター作成(工事中): character.md
      - セッションの流れ(工事中): session.md
      - 判定: checks.md
      - 種族: ancestry.md
      - 探索(工事中): exploration.md
      - 戦闘(工事中): combat.md
      - 印記とタグ(工事中): marksTags.md
      - 錬金とアイテム(工事中): alchemy.md
      - 町と工房(工事中): town.md
      - 倉庫と経済(工事中): economy.md
      - 世界と用語(工事中): world.md
      - マップと地景(工事中): map.md
      - 運営(工事中): operations.md

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js

plugins:
  - search
  - glightbox

hooks:
  - hooks/balance_tokens.py
