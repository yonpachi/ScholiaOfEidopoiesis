site_name: 想成のスコーリア
site_url: https://yonpachi.github.io/ScholiaOfEidopoiesis/
repo_url: https://github.com/yonpachi/ScholiaOfEidopoiesis
repo_name: yonpachi/ScholiaOfEidopoiesis

validation:
  links:
    not_found: ignore

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - カタログ:
      - 印記一覧: catalog/marks.md
      - タグ一覧: catalog/tags.md
      - アイテム: catalog/items.md
      - 武器・防具: catalog/weapons_armor.md
      - スコーリオン: catalog/scorions.md
      - 用語集: catalog/terms.md
